name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR
        id: create-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_URL=$(gh pr create \
            --title "Auto-merge: ${GITHUB_REF_NAME}" \
            --body "Automated merge from Claude branch" \
            --base main \
            --head "${GITHUB_REF_NAME}" 2>/dev/null || echo "exists")
          if [ "$PR_URL" = "exists" ]; then
            echo "PR already exists"
          fi

      - name: Merge PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 5
          gh pr merge "${GITHUB_REF_NAME}" --merge --admin || \
          gh pr merge "${GITHUB_REF_NAME}" --merge || true
