<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Tło -->
  <rect width="64" height="64" rx="14" fill="#EEEDFE"/>
  <!-- Arc tła (szary) -->
  <path d="M12 44 A22 22 0 0 1 52 44"
        fill="none" stroke="#AFA9EC" stroke-width="5" stroke-linecap="round"/>
  <!-- Arc wypełnienie ~65% (fiolet) -->
  <path d="M12 44 A22 22 0 0 1 40 22"
        fill="none" stroke="#534AB7" stroke-width="5" stroke-linecap="round"/>
  <!-- Wskazówka -->
  <line x1="32" y1="44" x2="40" y2="24"
        stroke="#3C3489" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Pivot -->
  <circle cx="32" cy="44" r="3" fill="#3C3489"/>
  <!-- Ticki -->
  <line x1="12" y1="44" x2="14" y2="40" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="22" x2="32" y2="26" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="52" y1="44" x2="50" y2="40" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round"/>
</svg>
